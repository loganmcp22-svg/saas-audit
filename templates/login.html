<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — SubAudit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0f172a;
      --navy-2:      #1e293b;
      --green:       #10b981;
      --green-dark:  #059669;
      --green-light: #ecfdf5;
      --green-ring:  rgba(16, 185, 129, 0.15);
      --green-border:#a7f3d0;
      --page-bg:     #f8fafc;
      --card-bg:     #ffffff;
      --border:      #e2e8f0;
      --text:        #0f172a;
      --muted:       #64748b;
      --subtle:      #94a3b8;
      --error-bg:    #fff1f2;
      --error-text:  #be123c;
      --error-border:#fecdd3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--navy);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 0 rgba(255,255,255,0.05);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.18rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
    }

    .brand-name .accent { color: var(--green); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link {
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: #ffffff;
      background: rgba(255,255,255,0.08);
    }

    /* ── Page ── */
    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 20px;
      min-height: calc(100vh - 60px);
    }

    .auth-wrap {
      width: 100%;
      max-width: 400px;
    }

    /* ── Header ── */
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.55;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 8px 28px rgba(15,23,42,0.08);
      border: 1px solid var(--border);
    }

    /* ── Form ── */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.93rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-ring);
      background: white;
    }

    /* ── Error ── */
    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 20px;
    }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 12px 24px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.01em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-submit:hover  { background: var(--navy-2); }
    .btn-submit:active { transform: scale(0.98); }

    .btn-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Footer link ── */
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--green-dark);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .navbar { padding: 0 16px; }
      .card { padding: 24px 18px; }
      .page { padding: 32px 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="brand">
      <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="36" height="36" rx="8" fill="#1e293b"/>
        <rect x="8" y="10" width="13" height="2.2" rx="1.1" fill="#10b981"/>
        <rect x="8" y="15" width="9" height="2.2" rx="1.1" fill="#10b981" fill-opacity="0.65"/>
        <rect x="8" y="20" width="11" height="2.2" rx="1.1" fill="#10b981" fill-opacity="0.4"/>
        <circle cx="24.5" cy="24.5" r="4.5" stroke="#10b981" stroke-width="2" fill="none"/>
        <line x1="27.7" y1="27.7" x2="30.5" y2="30.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Sub<span class="accent">Audit</span></span>
    </a>
    <div class="nav-right">
      <a href="/pricing" class="nav-link">Pricing</a>
    </div>
  </nav>

  <div class="page">
    <div class="auth-wrap">

      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Log in to your SubAudit account to continue.</p>
      </div>

      <div class="card">
        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-submit">
            <span class="btn-dot" aria-hidden="true"></span>
            Log In &rarr;
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Sign up free</a>
      </div>

    </div>
  </div>

</body>
</html>
